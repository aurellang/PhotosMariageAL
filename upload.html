<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Mariage de Laëtitia et Aurélien</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="page-hero upload-hero">
    <div class="wedding-title">
      <span>Mariage de</span>
      <strong>Laëtitia et Aurélien</strong>
    </div>
  </header>

  <img src="img/wallas.png" alt="Wallas" class="logo">

  <main class="card">
    <input id="photos" type="file" accept="image/*" multiple hidden>

    <button id="selectBtn">Ajouter les photos</button>
    <button id="uploadBtn" disabled>Envoyer</button>

    <p id="fileInfo">Veuillez sélectionner une photo</p>

    <progress id="progress" value="0" max="100"></progress>
    <p id="message"></p>

    <a class="menu-button menu-return-button" href="index.html">Menu</a>
  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
