<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Upload photos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="card">
    <h1>Envoyer des photos</h1>

    <input id="photos" type="file" accept="image/*" multiple hidden>

    <button id="selectBtn">Ajouter les photos</button>
    <button id="uploadBtn" disabled>Envoyer</button>

    <p id="fileInfo">Veuillez sélectionner une photo</p>

    <progress id="progress" value="0" max="100"></progress>
    <p id="message"></p>
  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
